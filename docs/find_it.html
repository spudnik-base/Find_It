## Claude Code — Full Build Brief

> One match. Every pair. Any subject. Build it.

**Project:** FIND IT — a browser-based educational card game generator for teachers.
The mechanic is a Dobble-style matching game: every pair of cards shares *exactly one* symbol.
Teachers upload their own content (words, images) and get a print-ready PDF card set.

---

## Chapter 1: Stack & Constraints

## Chapter 3: Core Algorithm — Projective Plane

> This is the heart of FIND IT. Get this right first.

Every valid set is built from a **finite projective plane of order n-1**, where n = symbols per card.

### Valid orders (n = symbols per card)
- n=4 → order 3 → 13 cards, 13 symbols
- n=6 → order 5 → 31 cards, 31 symbols
- n=8 → order 7 → 57 cards, 57 symbols

### Generation algorithm (in \`projective.js\`)

\`\`\`js
// Returns array of cards, each card is an array of symbol indices.
// Every pair of cards shares exactly one symbol index. Guaranteed.
function generateProjectivePlane(order) {
  const n = order;
  const cards = [];

  // 1. "Infinity" cards — one per slope plus the vertical
  for (let slope = 0; slope < n; slope++) {
    const card = [n * n + slope]; // infinity point for this slope
    for (let x = 0; x < n; x++) {
      card.push(x * n + ((slope * x) % n));
    }
    cards.push(card);
  }
  // Vertical infinity card
  const vertCard = [n * n + n];
  for (let x = 0; x < n; x++) vertCard.push(x * n + (n - 1));
  cards.push(vertCard);

  // 2. Affine cards — one per (x, y) point
  for (let x = 0; x < n; x++) {
    for (let y = 0; y < n; y++) {
      const card = [];
      for (let slope = 0; slope < n; slope++) {
        card.push(x * n + ((y - slope * x + n * n) % n));
        // attach infinity point
        card.push(n * n + slope);
      }
      // remove duplicates and trim to n symbols
      const unique = [...new Set(card)].slice(0, n);
      cards.push(unique);
    }
  }
  return cards; // array of (n²+n+1) cards, each length n
}
\`\`\`

**Important:** The teacher may not have exactly n²+n+1 symbols. Handle this:
- *Too few symbols* → pad with placeholder symbols (blank/star). Warn the teacher.
- *Too many symbols* → take the first n²+n+1. Warn that extras are unused.
- *Expose this mismatch clearly in the UI* before generating.

## Chapter 4: Card Layout Engine (\`layout.js\`)

### Inputs
- \`symbols[]\` — array of symbol objects \`{ type: 'word'|'image', value, displayLabel }\`
- \`cardRadius\` — canvas radius in px (default 320px canvas = 160px radius)
- \`sizeVariance\` — max size ratio between smallest and largest symbol (1.0–3.0)
- \`showDebug\` — boolean, draws OBB outlines for testing

### Word cap
Display labels for text symbols are capped at **8 characters**.
Store full term internally; only the display label is trimmed.

\`\`\`js
function capDisplay(word, max = 8) {
  return [...word].length <= max ? word : word.slice(0, max) + '.';
}
\`\`\`

Provide an *abbreviation map* override so teachers can define \`"amino acid" → "aa"\`, etc.

### Three-pass placement

**Pass 1 — Measure**
Set the canvas font, call \`ctx.measureText(label)\`, retrieve \`actualBoundingBoxAscent\` + \`Descent\`.
Store \`{ hw, hh }\` (half-width, half-height) per symbol. Include padding (8px each side).
For images, hw = hh = imageSize/2.

**Pass 2 — Place (SAT collision)**
For each symbol (shuffled randomly), attempt up to 500 random positions inside the card circle.
At each candidate position, run two checks:

1. **Circle boundary** — all 4 corners of the rotated OBB must satisfy:
   \`(corner.x - cx)² + (corner.y - cy)² ≤ (R - BORDER)²\`

2. **SAT overlap** — test against every already-placed OBB on 4 axes.
   If any axis has a separating gap, no collision → accept position.

\`\`\`js
function obbCorners({ cx, cy, hw, hh, rot }) {
  const cos = Math.cos(rot), sin = Math.sin(rot);
  return [
    [cx + cos*hw - sin*hh,  cy + sin*hw + cos*hh],
    [cx - cos*hw - sin*hh,  cy - sin*hw + cos*hh],
    [cx - cos*hw + sin*hh,  cy - sin*hw - cos*hh],
    [cx + cos*hw + sin*hh,  cy + sin*hw - cos*hh],
  ];
}

function obbOverlap(a, b, gap = 5) {
  const ca = obbCorners(a), cb = obbCorners(b);
  const axes = [
    [ Math.cos(a.rot),  Math.sin(a.rot)],
    [-Math.sin(a.rot),  Math.cos(a.rot)],
    [ Math.cos(b.rot),  Math.sin(b.rot)],
    [-Math.sin(b.rot),  Math.cos(b.rot)],
  ];
  for (const [ax, ay] of axes) {
    const pa = project(ca, ax, ay);
    const pb = project(cb, ax, ay);
    if (pa.max + gap < pb.min || pb.max + gap < pa.min) return false;
  }
  return true;
}
\`\`\`

**Pass 3 — Draw**
Render background circle, then each symbol at its placed position.
Words: pill background + text. Images: draw scaled \`HTMLImageElement\`.
No symbol is drawn if Pass 2 failed to place it (log a warning to console).

### Size assignment
\`\`\`js
function randSize(baseMin, baseMax) {
  const t = Math.random();
  if (t < 0.35) return baseMin;
  if (t < 0.72) return baseMin + (baseMax - baseMin) * 0.45;
  return baseMax;
}
\`\`\`
baseMin = 16px (words) or 20px (emoji/images). baseMax = baseMin × sizeVariance.

## Chapter 6: Card Renderer (\`renderer.js\`)

### Canvas spec
- Internal resolution: **640×640px** (rendered at 2× for retina)
- Display size: **220×220px** CSS (scaled via \`canvas.style\`)
- Card colours: rotate through 5 background tints: cream, mint, lavender, blush, ice

### Image symbols
\`\`\`js
async function drawImageSymbol(ctx, dataURL, x, y, size, rot) {
  const img = await loadImage(dataURL); // cache HTMLImageElement
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.drawImage(img, -size/2, -size/2, size, size);
  ctx.restore();
}
// Cache: Map<dataURL, HTMLImageElement>
\`\`\`

### Match symbol highlight
In *game preview* mode only — draw a subtle gold halo behind the matching symbol.
This is OFF in print/export mode.

### Layout

### Export flow
1. Generate all cards (projective plane → assign symbols → layout each card)
2. Render each card to an offscreen canvas at 640px
3. Convert each canvas to a dataURL (\`toDataURL('image/png')\`)
4. Build a hidden \`div.print-grid\` with \`<img>\` tags
5. Call \`window.print()\`
6. Remove the hidden div after 2 seconds

## Chapter 10: Edge Cases to Handle

| Situation | Behaviour |
|-----------|-----------|
| Fewer symbols than target | Pad with blanks. Show warning. Still generates. |
| Word over 8 chars | Auto-truncate display. Store original. Teacher can override in abbreviation map. |
| Symbol fails to place after 500 attempts | Skip it. Log to console. Show count of dropped symbols in UI. |
| Image load fails | Show a placeholder ⬜ symbol. |
| localStorage full | Show a toast warning. Offer to clear history. |
| Printing with images | Ensure images are fully loaded before \`window.print()\` is called. |
| Single-card set (edge case n=2) | Not a valid projective plane. Disable and explain. |

4. **QR code** on printed cards — links to definition/hint page
5. **Accessibility mode** — high contrast, dyslexia-friendly font, larger minimum symbol size

const STORAGE_KEY = 'findit-brief-v1';

function load() { return localStorage.getItem(STORAGE_KEY) || DEFAULT_MD; }
function save(md) { localStorage.setItem(STORAGE_KEY, md); }

function render(md) {
  document.getElementById('rendered').innerHTML = marked.parse(md);
}

let editMode = false, saveTimer = null;

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('editor-wrap').classList.toggle('visible', editMode);
  document.getElementById('render-wrap').classList.toggle('hidden', editMode);
  const btn = document.getElementById('toggleEdit');
  btn.textContent = editMode ? '👁 VIEW' : '✏ EDIT';
  btn.classList.toggle('active', editMode);
}

function onEdit(val) {
  render(val);
  setStatus('saving', '… saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { save(val); setStatus('saved', '✓ saved'); }, 600);
}

function setStatus(cls, txt) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status ' + cls;
  el.textContent = txt;
}

function clearStorage() {
  if (confirm('Reset to default content?')) {
    localStorage.removeItem(STORAGE_KEY);
    const md = DEFAULT_MD;
    document.getElementById('md-editor').value = md;
    render(md);
    setStatus('saved', '✓ reset');
  }
}

function downloadPDF() {
  if (editMode) toggleEdit();
  setTimeout(() => window.print(), 80);
}

const md = load();
document.getElementById('md-editor').value = md;
render(md);
</script>
